<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="160"
     height="90"
     viewBox="0 0 160 90">
  <defs>
    <linearGradient id="grad-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <g id="badge-shape">
      <rect x="0" y="0" width="52" height="28" rx="6" fill="url(#grad-a)"/>
    </g>
  </defs>

  <use id="badge-instance" href="#badge-shape" x="28" y="30"/>
  <use id="badge-instance-legacy" xlink:href="#badge-shape" x="92" y="30"/>
</svg>
